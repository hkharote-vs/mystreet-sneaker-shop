spring:
  application:
    name: mystreet-api

  jpa:
    open-in-view: false
    properties:
      hibernate:
        format_sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration

  threads:
    virtual:
      enabled: true

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

app:
  jwt:
    private-key: ${JWT_PRIVATE_KEY:classpath:certs/private.pem}
    public-key: ${JWT_PUBLIC_KEY:classpath:certs/public.pem}
    expiry-hours: ${JWT_EXPIRY_HOURS:24}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
